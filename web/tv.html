<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIRATAFLIX - TV Ao Vivo</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="tv-player.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #141414; color: white; }
        .header {
            position: fixed; top: 0; width: 100%; padding: 16px 50px;
            background: rgba(10,10,10,.95); z-index: 100;
            display: flex; justify-content: space-between; align-items: center;
            backdrop-filter: blur(8px); border-bottom: 1px solid rgba(255,255,255,.06);
        }
        .logo { font-size: 2rem; color: #e50914; font-weight: bold; text-decoration: none; }
        .nav-links { display: flex; gap: 20px; }
        .nav-link { color: #e5e5e5; text-decoration: none; font-size: .9rem; }
        .nav-link:hover { color: #fff; }
        .main-content { padding: 90px 40px 50px; }
        .filter-bar { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 24px; }
        .filter-search-wrap { position: relative; flex: 1; min-width: 220px; max-width: 360px; }
        .filter-search-wrap i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #555; font-size: .9rem; pointer-events: none; }
        #tvSearch { width: 100%; padding: 10px 12px 10px 36px; background: #1f1f1f; border: 1px solid rgba(255,255,255,.08); border-radius: 8px; color: white; font-size: .9rem; outline: none; transition: border .2s; }
        #tvSearch:focus { border-color: #e50914; }
        #tvSearch::placeholder { color: #444; }
        .group-filters { display: flex; gap: 8px; flex-wrap: wrap; flex: 1; }
        .group-btn { background: #1f1f1f; color: #ccc; border: 1px solid rgba(255,255,255,.08); border-radius: 20px; padding: 7px 14px; font-size: .8rem; cursor: pointer; transition: all .2s; white-space: nowrap; }
        .group-btn:hover { background: #2a2a2a; color: white; }
        .group-btn.active { background: #e50914; color: white; border-color: #e50914; }
        .page-title { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .page-title h1 { font-size: 1.8rem; }
        #itemCount { color: #e50914; font-size: .9rem; }
        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; }
        .item-card { border-radius: 8px; overflow: hidden; cursor: pointer; background: #1a1a1a; transition: transform .25s, box-shadow .25s; position: relative; }
        .item-card:hover { transform: scale(1.04); box-shadow: 0 8px 24px rgba(0,0,0,.6); z-index: 2; }
        .item-poster { width: 100%; height: 110px; object-fit: contain; background: #111; padding: 12px; display: block; }
        .item-title { padding: 10px 12px; font-size: .82rem; font-weight: bold; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border-top: 1px solid rgba(255,255,255,.05); }
        .live-badge { position: absolute; top: 8px; right: 8px; background: #e50914; color: white; padding: 3px 7px; border-radius: 3px; font-size: .7rem; font-weight: bold; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.6} }
        .loading { text-align: center; padding: 80px 20px; color: #e50914; font-size: 1.1rem; }
        .no-results { text-align: center; padding: 60px; color: #555; font-size: 1rem; }
        @media (max-width: 768px) {
            .header { padding: 14px 20px; }
            .main-content { padding: 76px 16px 40px; }
            .items-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; }
            .page-title h1 { font-size: 1.3rem; }
            .filter-search-wrap { min-width: 100%; }
        }
    </style>
</head>
<body>
    <header class="header">
        <a href="index.html" class="logo">PIRATAFLIX</a>
        <nav class="nav-links">
            <a href="index.html"    class="nav-link">Início</a>
            <a href="filmes.html"   class="nav-link">Filmes</a>
            <a href="series.html"   class="nav-link">Séries</a>
            <a href="novelas.html"  class="nav-link">Novelas</a>
            <a href="animes.html"   class="nav-link">Animes</a>
            <a href="infantil.html" class="nav-link">Infantil</a>
        </nav>
    </header>

    <main class="main-content">
        <div class="page-title">
            <h1>📡 TV AO VIVO</h1>
            <span id="itemCount"></span>
        </div>
        <div class="filter-bar">
            <div class="filter-search-wrap">
                <i class="fas fa-search"></i>
                <input type="text" id="tvSearch" placeholder="Buscar canal...">
            </div>
            <div class="group-filters" id="groupFilters"></div>
        </div>
        <div class="items-grid" id="itemsGrid">
            <div class="loading">Carregando canais...</div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="novo-player.js"></script>
    <script src="tv-player.js"></script>
    <script src="shared.js"></script>
    <script>
    const RAW_BASE = 'https://raw.githubusercontent.com/alberttartas/Pirataflix/main';
    let allCanais  = [];
    let activeGroup = 'Todos';

    async function loadTV() {
        try {
            await loadChannels();
            const r    = await fetch('data.json');
            const data = await r.json();
            window.vodData = data;
            allCanais      = data.tv || [];
            buildGroupFilters();
            renderCanais(allCanais);
            document.getElementById('tvSearch').addEventListener('input', applyFilters);
        } catch(err) {
            document.getElementById('itemsGrid').innerHTML = '<p class="no-results">Erro: ' + err.message + '</p>';
        }
    }

    function buildGroupFilters() {
        const groups = {};
        allCanais.forEach(c => { const g = c.group || '📺 Geral'; groups[g] = (groups[g]||0)+1; });
        const sorted = Object.entries(groups).sort((a,b) => b[1]-a[1]);
        const wrap   = document.getElementById('groupFilters');
        let html = '<button class="group-btn active" data-group="Todos">Todos (' + allCanais.length + ')</button>';
        sorted.forEach(([g, n]) => { html += '<button class="group-btn" data-group="' + g.replace(/"/g,'&quot;') + '">' + g + ' (' + n + ')</button>'; });
        wrap.innerHTML = html;
        wrap.addEventListener('click', e => {
            const btn = e.target.closest('.group-btn');
            if (!btn) return;
            wrap.querySelectorAll('.group-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            activeGroup = btn.dataset.group;
            applyFilters();
        });
    }

    function applyFilters() {
        const q = (document.getElementById('tvSearch').value||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
        let f = allCanais;
        if (activeGroup !== 'Todos') f = f.filter(c => (c.group||'📺 Geral') === activeGroup);
        if (q.length >= 2) f = f.filter(c => (c.title||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').includes(q));
        renderCanais(f);
    }

    function renderCanais(canais) {
        document.getElementById('itemCount').textContent = canais.length + ' canais';
        if (!canais.length) { document.getElementById('itemsGrid').innerHTML = '<div class="no-results">Nenhum canal encontrado</div>'; return; }
        const fallback = RAW_BASE + '/assets/Capas/tv_default.jpg';
        let html = '';
        canais.forEach(item => {
            const realIdx = allCanais.indexOf(item);
            let logo = item.tvg_logo || '';
            if (!logo) { const k = item.title.toLowerCase().replace(/[^a-z0-9]/g,''); logo = window.channelsDict[k] || fallback; }
            html += '<div class="item-card" onclick="openCh(' + realIdx + ')">'
                  + '<img src="' + logo + '" alt="" class="item-poster" onerror="this.onerror=null;this.src=\'' + fallback + '\'">'
                  + '<div class="live-badge">🔴 AO VIVO</div>'
                  + '<div class="item-title">' + item.title + '</div></div>';
        });
        document.getElementById('itemsGrid').innerHTML = html;
    }

    async function openCh(idx) {
        if (!window.vodData || !window.vodData.tv) {
            try { const r = await fetch('data.json'); window.vodData = await r.json(); } catch(e) {}
        }
        if (typeof window.openTVPlayer === 'function') { window.openTVPlayer(idx); return; }
        const c = allCanais[idx];
        if (c) window.open((c.episodes && c.episodes[0] ? c.episodes[0].url : c.url)||'', '_blank');
    }

    loadTV();
    </script>
</body>
</html>
