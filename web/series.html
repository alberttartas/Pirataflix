<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIRATAFLIX - Séries</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        /* MESMO CSS DO filmes.html */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Arial', sans-serif; background: #141414; color: white; }
        .header { position: fixed; top: 0; width: 100%; padding: 20px 50px; background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%); z-index: 100; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 2.5rem; color: #e50914; font-weight: bold; text-decoration: none; }
        .nav-links { display: flex; gap: 20px; }
        .nav-link { color: #e5e5e5; text-decoration: none; }
        .nav-link:hover { color: #fff; }
        .back-link { color: #e50914; text-decoration: none; font-size: 1rem; padding: 10px 20px; border: 1px solid #e50914; border-radius: 4px; transition: all 0.3s; }
        .back-link:hover { background: #e50914; color: white; }
        .main-content { padding: 120px 50px 50px; }
        .page-title { font-size: 2rem; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .item-card { border-radius: 4px; overflow: hidden; transition: transform 0.3s; cursor: pointer; position: relative; }
        .item-card:hover { transform: scale(1.05); z-index: 10; }
        .item-poster { width: 100%; height: 320px; object-fit: cover; }
        .item-title { padding: 10px; font-weight: bold; text-align: center; }
        .loading { text-align: center; padding: 100px 20px; color: #e50914; font-size: 1.2rem; }
        @media (max-width: 768px) { .header { padding: 20px; } .main-content { padding: 100px 20px 20px; } .page-title { font-size: 1.5rem; } }
    </style>
</head>
<body>
    <header class="header">
        <a href="index.html" class="logo">PIRATAFLIX</a>
        <nav class="nav-links">
            <a href="index.html" class="nav-link">← Voltar</a>
        </nav>
    </header>

    <main class="main-content">
        <div class="page-title">
            <h1>📺 Todas as Séries</h1>
            <span id="itemCount" style="color: #e50914;"></span>
        </div>
        <div class="items-grid" id="itemsGrid">
            <div class="loading">Carregando séries...</div>
        </div>
    </main>

    <script>
        const RAW_BASE = 'https://raw.githubusercontent.com/alberttartas/Pirataflix/main';
        
        async function loadSeries() {
            try {
                const response = await fetch('data.json');
                const data = await response.json();
                const series = data.series || [];
                
                document.getElementById('itemCount').textContent = `${series.length} séries`;
                
                let html = '';
                series.forEach(item => {
                    const nomeArquivo = item.poster ? item.poster.split('/').pop() : 'default.jpg';
                    const poster = `${RAW_BASE}/assets/Capas/${nomeArquivo}`;
                    
                    html += `
                        <div class="item-card" onclick="window.location.href='index.html#series'">
                            <img src="${poster}" alt="${item.title}" class="item-poster"
                                 onerror="this.onerror=null; this.src='${RAW_BASE}/assets/Capas/default.jpg';">
                            <div class="item-title">${item.title}</div>
                        </div>
                    `;
                });
                
                document.getElementById('itemsGrid').innerHTML = html || '<p>Nenhuma série encontrada</p>';
            } catch (error) {
                document.getElementById('itemsGrid').innerHTML = `<p>Erro: ${error.message}</p>`;
            }
        }
        
        loadSeries();
    </script>
</body>
</html>
