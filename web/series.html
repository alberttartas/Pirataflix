<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIRATAFLIX - Séries</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#e50914">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Pirataflix">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="tv-player.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Arial', sans-serif; background: #141414; color: white; }
        
        .header {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 20px 50px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 2.5rem;
            color: #e50914;
            font-weight: bold;
            text-decoration: none;
        }
        
        .nav-links { display: flex; gap: 20px; }
        .nav-link { color: #e5e5e5; text-decoration: none; }
        .nav-link:hover { color: #fff; }
        
        .main-content { padding: 120px 50px 50px; }
        
        .page-title {
            font-size: 2rem;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }
        
        .item-card {
            border-radius: 4px;
            overflow: hidden;
            transition: transform 0.3s;
            cursor: pointer;
            position: relative;
        }
        
        .item-card:hover {
            transform: scale(1.05);
            z-index: 10;
        }
        
        .item-poster {
            width: 100%;
            height: 320px;
            object-fit: cover;
        }
        
        .item-title {
            padding: 10px;
            font-weight: bold;
            text-align: center;
        }
        
        .loading {
            text-align: center;
            padding: 100px 20px;
            color: #e50914;
            font-size: 1.2rem;
        }
        
        @media (max-width: 768px) {
            .header { padding: 20px; }
            .main-content { padding: 100px 20px 20px; }
            .page-title { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <header class="header">
        <a href="index.html" class="logo">PIRATAFLIX</a>
        <nav class="nav-links">
            <a href="index.html" class="nav-link">← Voltar</a>
        </nav>
    </header>

    <main class="main-content">
        <div class="page-title">
            <h1>📺 Todas as Séries</h1>
            <span id="itemCount" style="color: #e50914;"></span>
        </div>
        <div class="items-grid" id="itemsGrid">
            <div class="loading">Carregando séries...</div>
        </div>
    </main>

    <!-- Modal -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-header" id="modalHeader">
                <button class="modal-close" id="closeModal"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <!-- TV Player -->
    <div class="tv-player-container" id="tvPlayerContainer">
        <video id="tvPlayer" autoplay playsinline></video>
    </div>

    <!-- Scripts compartilhados -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="novo-player.js"></script>
    <script src="tv-player.js"></script>
    <script src="shared.js"></script>

    <script>
    // Carregar channels
    loadChannels();
    
    // Configurar listeners do modal
    setupModalListeners();
    
    // Carregar dados específicos da página
    async function loadSeries() {
        try {
            const response = await fetch('data.json');
            const data = await response.json();
            window.vodData = data;
            const series = data.series || [];
            
            document.getElementById('itemCount').textContent = `${series.length} séries`;
            
            let html = '';
            series.forEach(item => {
                const poster = getPoster(item, 'series');
                
                html += `
                    <div class="item-card" data-id="${item.id}" data-category="series">
                        ${safeImg(poster, item.title)}
                        <div class="item-title">${item.title}</div>
                    </div>
                `;
            });
            
            document.getElementById('itemsGrid').innerHTML = html || '<p>Nenhuma série encontrada</p>';
            
            // Adicionar eventos de clique
            document.querySelectorAll('.item-card').forEach(card => {
                card.addEventListener('click', function() {
                    var id = this.dataset.id;
                    var cat = this.dataset.category;
                    if (id && cat) openModal(cat, id);
                });
            });
            
        } catch (error) {
            document.getElementById('itemsGrid').innerHTML = `<p>Erro: ${error.message}</p>`;
        }
    }
    
    // Iniciar
    loadSeries();
    </script>

    <!-- PWA Service Worker + Install Button -->
    <script>
    // Register Service Worker
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js').catch(() => {});
        });
    }

    // Install button logic
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        const btn = document.getElementById('pwa-install-btn');
        if (btn) btn.style.display = 'flex';
    });

    window.addEventListener('appinstalled', () => {
        const btn = document.getElementById('pwa-install-btn');
        if (btn) btn.style.display = 'none';
        deferredPrompt = null;
    });

    function installPWA() {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(() => { deferredPrompt = null; });
    }
    </script>

    <!-- PWA Install Button (fixed) -->
    <style>
    #pwa-install-btn {
        display: none;
        position: fixed;
        bottom: 24px;
        right: 24px;
        z-index: 9999;
        align-items: center;
        gap: 8px;
        background: #e50914;
        color: white;
        border: none;
        border-radius: 30px;
        padding: 12px 20px;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 4px 20px rgba(229,9,20,0.5);
        transition: transform 0.2s, box-shadow 0.2s;
        font-family: Arial, sans-serif;
        text-decoration: none;
        animation: pulse-pwa 2.5s ease-in-out infinite;
    }
    #pwa-install-btn:hover {
        transform: scale(1.06);
        box-shadow: 0 6px 28px rgba(229,9,20,0.7);
        animation: none;
    }
    @keyframes pulse-pwa {
        0%, 100% { box-shadow: 0 4px 20px rgba(229,9,20,0.5); }
        50% { box-shadow: 0 4px 32px rgba(229,9,20,0.9); }
    }
    #pwa-install-btn svg { width: 18px; height: 18px; fill: white; flex-shrink: 0; }
    </style>
    <button id="pwa-install-btn" onclick="installPWA()" title="Instalar Pirataflix">
        <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zm-8 2V5h2v6h1.17L12 13.17 9.83 11H11zm-6 7h14v2H5z"/></svg>
        Instalar App
    </button>
</body>
</html>
