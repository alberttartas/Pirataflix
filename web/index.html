<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIRATAFLIX</title>
    
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <link rel="shortcut icon" href="favicon.png">

    <style>
        /* Seu CSS existente - manter igual */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body { 
            font-family: 'Arial', sans-serif; 
            background: #141414; 
            color: white; 
            line-height: 1.4;
        }
        
        /* Loading */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #141414;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }
        
        .loading-screen.fade-out {
            opacity: 0;
            pointer-events: none;
        }
        
        .loading-container {
            text-align: center;
        }
        
        .loading-icon {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            animation: quickPulse 0.8s ease-in-out infinite;
        }
        
        .loading-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 15px rgba(229, 9, 20, 0.7));
        }
        
        .loading-dots {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 20px;
        }
        
        .dot {
            width: 12px;
            height: 12px;
            background: #e50914;
            border-radius: 50%;
            animation: quickDot 0.8s infinite;
        }
        
        .dot:nth-child(2) {
            animation-delay: 0.2s;
        }
        
        .dot:nth-child(3) {
            animation-delay: 0.4s;
        }
        
        .loading-text {
            color: #e50914;
            font-size: 1.2rem;
            margin-top: 20px;
            letter-spacing: 2px;
        }
        
        @keyframes quickPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        @keyframes quickDot {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        
        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px 50px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 2.5rem;
            color: #e50914;
            font-weight: bold;
            text-decoration: none;
        }
        
        .nav-links {
            display: flex;
            gap: 20px;
        }
        
        .nav-link {
            color: #e5e5e5;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }
        
        .nav-link:hover {
            color: #b3b3b3;
        }
        
        .main-content {
            padding-top: 100px;
        }
        
        .category-section {
            margin-bottom: 40px;
            padding: 0 50px;
        }
        
        .category-title {
            font-size: 1.4rem;
            margin-bottom: 15px;
            color: #fff;
            font-weight: bold;
        }
        
        .items-grid {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 10px 0;
            scrollbar-width: none;
        }
        
        .items-grid::-webkit-scrollbar {
            display: none;
        }
        
        .item-card {
            flex: 0 0 auto;
            width: 220px;
            border-radius: 4px;
            overflow: hidden;
            transition: transform 0.3s;
            cursor: pointer;
            position: relative;
        }
        
        .item-card:hover {
            transform: scale(1.1);
            z-index: 10;
        }
        
        .item-card:hover .item-poster {
            opacity: 0.5;
        }
        
        .item-card:hover .item-info {
            opacity: 1;
        }
        
        .item-poster {
            width: 100%;
            height: 320px;
            object-fit: cover;
            display: block;
            transition: opacity 0.3s;
        }
        
        .item-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
            padding: 20px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .item-title {
            font-size: 1.1rem;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        .item-meta {
            font-size: 0.85rem;
            color: #b3b3b3;
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            overflow-y: auto;
        }
        
        .modal-content {
            background: #181818;
            border-radius: 8px;
            max-width: 850px;
            margin: 50px auto;
            position: relative;
            overflow: hidden;
        }
        
        .modal-header {
            position: relative;
            height: 450px;
            overflow: hidden;
        }
        
        .modal-backdrop {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0.4;
        }
        
        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            z-index: 1001;
        }
        
        .modal-body {
            padding: 30px;
            position: relative;
            z-index: 1;
        }
        
        .modal-title {
            font-size: 2rem;
            margin-bottom: 20px;
            color: #fff;
        }
        
        .modal-meta {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            color: #b3b3b3;
        }
        
        .episodes-section {
            margin-top: 30px;
        }
        
        .episode-list {
            display: grid;
            gap: 10px;
        }
        
        .episode-item {
            background: #2d2d2d;
            border-radius: 4px;
            padding: 15px;
            cursor: pointer;
            transition: background 0.3s;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .episode-item:hover {
            background: #3d3d3d;
        }
        
        .episode-number {
            background: #e50914;
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            flex-shrink: 0;
        }
        
        .episode-info {
            flex: 1;
        }
        
        .episode-title {
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .play-button {
            background: #e50914;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
            transition: background 0.3s;
        }
        
        .play-button:hover {
            background: #f40612;
        }
        
        .error {
            text-align: center;
            padding: 100px 20px;
            color: #e50914;
            font-size: 1.2rem;
        }
        
        @media (max-width: 768px) {
            .header {
                padding: 20px;
            }
            
            .logo {
                font-size: 2rem;
            }
            
            .category-section {
                padding: 0 20px;
            }
            
            .item-card {
                width: 180px;
            }
            
            .item-poster {
                height: 260px;
            }
            
            .modal-content {
                margin: 20px;
            }
            
            .modal-header {
                height: 300px;
            }
        }
    </style>
</head>
<body>
    <!-- Loading -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-container">
            <div class="loading-icon">
                <img src="https://raw.githubusercontent.com/alberttartas/Pirataflix/main/favicon.png" alt="PIRATAFLIX">
            </div>
            <div class="loading-dots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
            <div class="loading-text">CARREGANDO</div>
        </div>
    </div>

    <!-- Header -->
    <header class="header">
        <a href="#" class="logo">PIRATAFLIX</a>
        <nav class="nav-links">
            <a href="#filmes" class="nav-link">Filmes</a>
            <a href="#series" class="nav-link">Séries</a>
            <a href="#novelas" class="nav-link">Novelas</a>
            <a href="#animes" class="nav-link">Animes</a>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="main-content" id="content" style="display: none;">
        <div class="loading">Carregando catálogo...</div>
    </main>

    <!-- Modal -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-header" id="modalHeader">
                <button class="modal-close" id="closeModal">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Conteúdo do modal -->
            </div>
        </div>
    </div>

    <script>
        // Debug - verificar caminho do data.json
        console.log('📍 Localização atual:', window.location.href);
        
        window.vodData = {};
        let currentItem = null;
        
        function hideLoading() {
            const loadingScreen = document.getElementById('loadingScreen');
            if (loadingScreen) {
                loadingScreen.classList.add('fade-out');
                setTimeout(() => {
                    loadingScreen.style.display = 'none';
                }, 500);
            }
        }
        
        async function loadData() {
            try {
                console.log('📡 Tentando carregar data.json...');
                
                // Tentar diferentes caminhos
                let response;
                const paths = [
                    'data.json',
                    './data.json',
                    '/data.json',
                    'web/data.json',
                    '../data.json'
                ];
                
                for (const path of paths) {
                    try {
                        console.log(`Tentando: ${path}`);
                        response = await fetch(path);
                        if (response.ok) {
                            console.log(`✅ Sucesso com: ${path}`);
                            break;
                        }
                    } catch (e) {
                        console.log(`❌ Falha com: ${path}`);
                    }
                }
                
                if (!response || !response.ok) {
                    throw new Error('Não foi possível encontrar data.json');
                }
                
                const data = await response.json();
                console.log('✅ Dados carregados:', data);
                console.log('📊 Categorias:', Object.keys(data));
                
                window.vodData = data;
                hideLoading();
                displayContent();
                
            } catch (error) {
                console.error('❌ Erro:', error);
                document.getElementById('content').innerHTML = 
                    '<div class="error">' +
                    '<h2>Erro ao carregar dados</h2>' +
                    '<p>' + error.message + '</p>' +
                    '<p>Verifique se o arquivo data.json existe na pasta web/</p>' +
                    '</div>';
                hideLoading();
            }
        }
        
        function displayContent() {
            const contentDiv = document.getElementById('content');
            let html = '';
            
            const categoryOrder = ['filmes', 'series', 'novelas', 'animes', 'infantil'];
            const categoryNames = {
                'filmes': '🎬 Filmes',
                'series': '📺 Séries', 
                'novelas': '💖 Novelas',
                'animes': '👻 Animes',
                'infantil': '🧸 Infantil'
            };
            
            let totalItems = 0;
            categoryOrder.forEach(category => {
                const items = vodData[category];
                if (!items || items.length === 0) return;
                
                totalItems += items.length;
                console.log(`${category}: ${items.length} itens`);
                
                html += `
                <section class="category-section" id="${category}">
                    <h2 class="category-title">${categoryNames[category]}</h2>
                    <div class="items-grid">`;
                
                items.forEach(item => {
                    const nomeArquivo = item.poster ? item.poster.split('/').pop() : 'default.jpg';
                    const poster = `https://raw.githubusercontent.com/alberttartas/Pirataflix/main/assets/Capas/${nomeArquivo}`;
                    
                    const episodeCount = item.episodes ? item.episodes.length : 0;
                    const seasonCount = item.seasons ? item.seasons.length : 0;
                    
                    let meta = '';
                    if (category === 'filmes') {
                        meta = `Filme • ${episodeCount} episódio(s)`;
                    } else if (seasonCount > 1) {
                        meta = `${seasonCount} temporadas`;
                    } else {
                        meta = `${episodeCount} episódios`;
                    }
                    
                    html += `
                    <div class="item-card" onclick="openModal('${category}', '${item.id}')">
                        <img src="${poster}" alt="${item.title}" class="item-poster"
                             onerror="this.onerror=null; this.src='https://raw.githubusercontent.com/alberttartas/Pirataflix/main/assets/Capas/default.jpg';">
                        <div class="item-info">
                            <div class="item-title">${item.title}</div>
                            <div class="item-meta">${meta}</div>
                        </div>
                    </div>`;
                });
                
                html += `</div></section>`;
            });
            
            console.log(`📊 Total de itens: ${totalItems}`);
            
            if (totalItems === 0) {
                contentDiv.innerHTML = '<div class="error">Nenhum conteúdo encontrado no catálogo</div>';
            } else {
                contentDiv.innerHTML = html;
            }
        }
        
        // [Resto das funções openModal, playFirstEpisode, playEpisode...]
        // (manter iguais ao seu código original)
        
        // Fechar modal
        document.getElementById('closeModal').onclick = function() {
            document.getElementById('modal').style.display = 'none';
        };
        
        window.onclick = function(event) {
            const modal = document.getElementById('modal');
            if (event.target === modal) {
                modal.style.display = 'none';
            }
        };
        
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                document.getElementById('modal').style.display = 'none';
            }
        });
        
        // Carregar dados
        loadData();
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="novo-player.js" defer></script>
</body>
</html>
