<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PIRATAFLIX</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="tizen.css">
</head>
<body>

  <header id="header">
    <div class="logo">PIRATAFLIX</div>
    <nav id="nav"></nav>
  </header>

  <main id="main">
    <div id="loading">Carregando...</div>
    <div id="catalog"></div>
  </main>

  <!-- MODAL -->
  <div id="modal">
    <div id="modal-inner">
      <div id="modal-bg"></div>
      <div id="modal-body"></div>
    </div>
  </div>

  <!-- PLAYER -->
  <div id="player-wrap">
    <video id="player" autoplay playsinline webkit-playsinline></video>
    <div id="osd"></div>
    <div id="player-ui">
      <div id="player-title-bar"></div>
      <div id="player-bottom">
        <div id="player-btns">
          <button id="btn-prev-ep" class="pbtn">⏮</button>
          <button id="btn-back"    class="pbtn">⏪ 10s</button>
          <button id="btn-play"    class="pbtn">⏸</button>
          <button id="btn-fwd"     class="pbtn">10s ⏩</button>
          <button id="btn-next-ep" class="pbtn">⏭</button>
          <button id="btn-close"   class="pbtn pbtn-close">✕ Sair</button>
        </div>
        <div id="prog-wrap"><div id="prog-fill"></div></div>
        <div id="time-row">
          <span id="time-cur">0:00</span>
          <span id="time-sep"> / </span>
          <span id="time-dur">0:00</span>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.12/dist/hls.min.js"></script>
  <script src="tizen-app.js"></script>
</body>
</html>
