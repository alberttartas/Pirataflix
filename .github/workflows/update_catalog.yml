name: Atualizar Catálogo Automático

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'download_iptv.py'
      - 'build.py'

jobs:
  update-catalog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v3
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Verificar arquivos
        run: |
          echo "📂 Listando arquivos na raiz:"
          ls -la
          echo ""
          echo "📂 Verificando download_iptv.py:"
          if [ -f "download_iptv.py" ]; then
            echo "✅ Arquivo encontrado!"
            head -5 download_iptv.py
          else
            echo "❌ Arquivo NÃO encontrado!"
            exit 1
          fi

      - name: Baixar fontes IPTV
        run: |
          echo "📡 Executando download_iptv.py..."
          python download_iptv.py
          echo "📂 Listando arquivos baixados:"
          ls -la input_auto/ || echo "input_auto/ não existe"

      - name: Listar pastas após download
        run: |
          echo "📂 Pastas criadas:"
          ls -la input_auto/ || echo "input_auto/ não existe"
          echo ""
          echo "📂 Conteúdo de input_auto/:"
          find input_auto -type f -name "*.m3u" 2>/dev/null || echo "Nenhum arquivo .m3u encontrado"

      - name: Executar build do site
        run: |
          echo "🏗️ Gerando site..."
          python build.py

      - name: Commit automático
        id: git-check
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Não adicionar o integrate-player.js
          git add iptv_playlists/ web/data.json web/index.html input_auto/
          
          # Restaurar integrate-player.js se foi adicionado
          git restore --staged web/integrate-player.js 2>/dev/null || true
          
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "✅ Sem mudanças para commit"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            git commit -m "Auto-generate IPTV playlists"
            
            # Tentar push com pull primeiro
            git pull --rebase origin main || true
            git push origin main
          fi
