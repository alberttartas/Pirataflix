name: Atualizar Catálogo Automático

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'download_iptv.py'
      - 'consolidar_data.py'
      - 'build.py'
      - 'input_auto/**'

jobs:
  update-catalog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Verificar arquivos
        run: |
          echo "📂 Listando arquivos na raiz:"
          ls -la
          echo ""
          echo "📂 Verificando scripts necessários:"
          for script in download_iptv.py consolidar_data.py build.py; do
            if [ -f "$script" ]; then
              echo "✅ $script encontrado!"
            else
              echo "❌ $script NÃO encontrado!"
              exit 1
            fi
          done

      - name: Baixar fontes IPTV
        run: |
          echo "============================================================"
          echo "📡 EXECUTANDO DOWNLOAD IPTV"
          echo "============================================================"
          if [ -f "download_iptv.py" ]; then
            python download_iptv.py
            echo "✅ Download concluído!"
            
            # Verificar resultados
            if [ -f "web/channels.json" ]; then
              echo "📺 Canais baixados: $(grep -c '"title"' web/channels.json || echo "0")"
            else
              echo "⚠️ channels.json não foi criado"
            fi
          else
            echo "❌ download_iptv.py não encontrado!"
            exit 1
          fi

      - name: Consolidar dados no data.json
        run: |
          echo "============================================================"
          echo "🔄 CONSOLIDANDO DADOS NO DATA.JSON"
          echo "============================================================"
          if [ -f "consolidar_data.py" ]; then
            python consolidar_data.py
            echo "✅ Consolidação concluída!"
            
            # Estatísticas do data.json
            if [ -f "web/data.json" ]; then
              echo "📊 Estatísticas do catálogo:"
              
              filmes=$(grep -o '"filmes":\[[^]]*\]' web/data.json | grep -o '"title"' | wc -l || echo "0")
              series=$(grep -o '"series":\[[^]]*\]' web/data.json | grep -o '"title"' | wc -l || echo "0")
              novelas=$(grep -o '"novelas":\[[^]]*\]' web/data.json | grep -o '"title"' | wc -l || echo "0")
              animes=$(grep -o '"animes":\[[^]]*\]' web/data.json | grep -o '"title"' | wc -l || echo "0")
              infantil=$(grep -o '"infantil":\[[^]]*\]' web/data.json | grep -o '"title"' | wc -l || echo "0")
              tv=$(grep -o '"tv":\[[^]]*\]' web/data.json | grep -o '"title"' | wc -l || echo "0")
              
              echo "   🎬 Filmes: $filmes"
              echo "   📺 Séries: $series"
              echo "   💖 Novelas: $novelas"
              echo "   👻 Animes: $animes"
              echo "   🧸 Infantil: $infantil"
              echo "   📡 TV: $tv"
              echo "   📊 TOTAL: $((filmes + series + novelas + animes + infantil + tv)) itens"
            fi
          else
            echo "❌ consolidar_data.py não encontrado!"
            exit 1
          fi

      - name: Executar build do site
        run: |
          echo "============================================================"
          echo "🏗️ EXECUTANDO BUILD"
          echo "============================================================"
          if [ -f "build.py" ]; then
            python build.py
            echo "✅ Build concluído!"
            
            # Verificar resultados do build
            if [ -d "iptv_playlists" ]; then
              echo "📊 Playlists geradas:"
              ls -la iptv_playlists/
              echo ""
              if [ -f "iptv_playlists/pirataflix_completo.m3u" ]; then
                total_streams=$(grep -c "^http" iptv_playlists/pirataflix_completo.m3u || echo "0")
                echo "📡 Total de streams na playlist completa: $total_streams"
              fi
            fi
          else
            echo "❌ build.py não encontrado!"
            exit 1
          fi

      - name: Configurar Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Resolver divergências e preparar commit
        id: git-check
        run: |
          echo "============================================================"
          echo "🔄 RESOLVENDO DIVERGÊNCIAS"
          echo "============================================================"
          
          # Buscar últimas mudanças do remote
          git fetch origin main
          
          # Tentar rebase automático (usando a estratégia 'ours' para manter nossas mudanças)
          if git rebase origin/main; then
            echo "✅ Rebase realizado com sucesso!"
          else
            echo "⚠️ Rebase falhou, resolvendo conflitos automaticamente..."
            # Em caso de conflito, manter nossas mudanças
            git rebase --abort || true
            git merge -X ours origin/main --no-edit || true
          fi
          
          echo "============================================================"
          echo "📦 PREPARANDO COMMIT"
          echo "============================================================"
          
          # Adicionar todos os arquivos gerados
          git add iptv_playlists/ web/ input_auto/ || true
          
          # Remover arquivos que não devem ser commitados
          git restore --staged web/integrate-player.js 2>/dev/null || true
          git restore --staged web/*.bak 2>/dev/null || true
          git restore --staged web/*.tmp 2>/dev/null || true
          
          # Mostrar o que será commitado
          echo "📋 Arquivos staged:"
          git diff --staged --name-status
          
          # Verificar se há mudanças
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "✅ Sem mudanças para commit"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            
            # Estatísticas das mudanças
            echo "📊 Estatísticas das mudanças:"
            git diff --staged --shortstat
            
            # Criar mensagem de commit com estatísticas
            if [ -f "iptv_playlists/pirataflix_completo.m3u" ]; then
              total=$(grep -c "^http" iptv_playlists/pirataflix_completo.m3u || echo "0")
              if [ -f "web/data.json" ]; then
                tv=$(grep -o '"tv":\[[^]]*\]' web/data.json | grep -o '"title"' | wc -l || echo "0")
                COMMIT_MSG="🤖 Atualização automática: $(date +'%d/%m/%Y') - Total: $total streams | TV: $tv canais"
              else
                COMMIT_MSG="🤖 Atualização automática: $(date +'%d/%m/%Y') - Total: $total streams"
              fi
            else
              COMMIT_MSG="🤖 Atualização automática: $(date +'%d/%m/%Y')"
            fi
            
            git commit -m "$COMMIT_MSG"
            echo "✅ Commit criado: $COMMIT_MSG"
          fi

      - name: Push das mudanças
        if: steps.git-check.outputs.changed == 'true'
        run: |
          echo "============================================================"
          echo "📤 FAZENDO PUSH DAS MUDANÇAS"
          echo "============================================================"
          
          # Tentar push normal
          if git push origin main; then
            echo "✅ Push realizado com sucesso!"
          else
            echo "⚠️ Push falhou, tentando com force lease..."
            # Segunda tentativa com force-with-lease (mais seguro que force)
            git push --force-with-lease origin main
            echo "✅ Push com --force-with-lease realizado!"
          fi
