name: Atualizar Catálogo Automático

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'download_iptv.py'
      - 'build.py'

jobs:
  update-catalog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v3
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Verificar arquivos
        run: |
          echo "📂 Listando arquivos na raiz:"
          ls -la
          echo ""
          echo "📂 Verificando download_iptv.py:"
          if [ -f "download_iptv.py" ]; then
            echo "✅ Arquivo encontrado!"
            head -5 download_iptv.py
          else
            echo "❌ Arquivo NÃO encontrado!"
            exit 1
          fi

      - name: Baixar fontes IPTV
        run: |
          echo "📡 Executando download_iptv.py..."
          python download_iptv.py
          echo "📂 Listando arquivos baixados:"
          ls -la input_auto/ || echo "input_auto/ não existe"

      - name: Listar pastas após download
        run: |
          echo "📂 Pastas criadas:"
          ls -la input_auto/ || echo "input_auto/ não existe"
          echo ""
          echo "📂 Conteúdo de input_auto/:"
          find input_auto -type f -name "*.m3u" 2>/dev/null || echo "Nenhum arquivo .m3u encontrado"

      - name: Executar build do site
        run: |
          echo "🏗️ Gerando site..."
          python build.py

      - name: Verificar mudanças
        id: git-check
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add iptv_playlists/ web/ input_auto/
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit automático
        if: steps.git-check.outputs.changed == 'true'
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "Auto-generate IPTV playlists"
          branch: main
          file_pattern: iptv_playlists/*.m3u iptv_playlists/*.xml
