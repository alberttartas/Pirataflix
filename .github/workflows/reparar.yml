name: Reparar Links Novelas

on:
  workflow_dispatch: # botão manual no GitHub
  schedule:
    - cron: '0 */6 * * *' # roda a cada 6 horas

jobs:
  reparar:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Clonar repositório
        uses: actions/checkout@v4

      - name: 🟢 Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 📦 Instalar dependências
        run: npm install || echo "sem dependências"

      - name: 🚀 Rodar script de reparo
        run: node reparar.js

      - name: 💾 Commit das alterações
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "🔧 Atualização automática dos links" || echo "Sem mudanças"
          git push
